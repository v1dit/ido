services:
  - type: web
    name: cad-agent-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: CAD_AGENT_DEMO_MODE
        value: "false"
      - key: CAD_AGENT_LOG_LEVEL
        value: INFO
      - key: CAD_AGENT_PROVIDER
        value: pioneer
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_MODEL_ID
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai/v1
      - key: CLICKHOUSE_ENABLED
        value: "true"
      - key: CLICKHOUSE_HOST
        sync: false
      - key: CLICKHOUSE_PORT
        sync: false
      - key: CLICKHOUSE_USERNAME
        sync: false
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: CLICKHOUSE_SECURE
        value: "true"
      - key: CLICKHOUSE_DATABASE
        value: default
      - key: CLICKHOUSE_TABLE
        value: cad_agent_traces
